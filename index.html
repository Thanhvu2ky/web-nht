<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Web Thành</title>
    <style>
        body {
            background: linear-gradient(135deg, pink, lightblue);
            font-family: Arial;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 50px;
            font-size: 40px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: white;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background: yellow;
        }
    </style>
</head>

<body>

    <h1>🔥 Chào mừng đến web của Thành 🔥</h1>
    <p>Server Yeamiko chill hết mình 😎</p>

    <button onclick="sayHello()">Bấm vào đây</button>

    <script>
        function sayHello() {
            alert("Hello bro 😎🔥");
        }
    </script>

</body>
</html>
