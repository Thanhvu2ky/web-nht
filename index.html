<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yeamiko Ultra</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000000, #002200);
    color: #00ff00;
    text-align: center;
}

/* hiệu ứng nền */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #00ff0022, transparent);
    animation: bgMove 6s infinite alternate;
    
    z-index: -1;           /* 🔥 QUAN TRỌNG */
    pointer-events: none;  /* 🔥 QUAN TRỌNG */
}
@keyframes bgMove {
    from { transform: translateY(0); }
    to { transform: translateY(-30px); }
}

.container {
    padding: 50px 20px;
}

h1 {
    font-size: 40px;
    text-shadow: 0 0 10px #00ff00, 0 0 30px #00ff00;
}

p {
    opacity: 0.8;
}

/* card */
.card {
    background: #111;
    margin: 20px auto;
    padding: 20px;
    border-radius: 20px;
    max-width: 400px;
    box-shadow: 0 0 15px #00ff00;
    animation: fade 1s;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* nút */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 30px;
    border-radius: 15px;
    background: black;
    color: #00ff00;
    border: 2px solid #00ff00;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #00ff00;
    color: black;
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="container">
    <h1>🔥 YEAMIKO ULTRA 🔥</h1>
    <p>Server chill - nơi giải trí của bạn 😎</p>

<a href="https://dungmc.xyz" class="btn">🚀 Tham gia web server</a>
    <a href="https://discord.gg/tenserver" class="btn">🚀 Tham gia discord</a>
    <div class="card">
        <h2>💚 Giới thiệu</h2>
        <p>
            Tôi là Thành.<br>
            Đây là web cá nhân của mình để chia sẻ và giao lưu với mọi người!
        </p>
    </div>

    <div class="card">
        <h2>🌟 Về server</h2>
        <p>
            ✔ Cụm Chill<br>
            ✔ Cụm SMP<br>
            ✔ Cộng đồng thân thiện
        </p>
    </div>

    <div class="card">
        <h2>📢 Thông tin</h2>
        <p>
            Tham gia để chơi cùng mình nhé 🔥
        </p>
    </div>
</div>

</body>
</html>
