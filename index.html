<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Pro</title>

<style>
body {
    background: black;
    color: #00ff00;
    text-align: center;
    font-family: Arial;
}

/* hiệu ứng neon chữ */
h1, h2, h3 {
    text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
}

canvas {
    background: #111;
    margin-top: 20px;
    box-shadow: 0 0 20px #00ff00;
}

/* nút */
button {
    padding: 10px;
    margin: 5px;
    font-size: 18px;
    border-radius: 10px;
    background: black;
    color: #00ff00;
    border: 2px solid #00ff00;
}

button:hover {
    background: #00ff00;
    color: black;
}

/* điều khiển */
.controls {
    margin-top: 15px;
}
</style>
</head>

<body>

<h1>🐍 Snake Pro</h1>
<h2 id="score">Điểm: 0</h2>
<h3 id="high">High Score: 0</h3>

<canvas id="canvas" width="400" height="400"></canvas>

<div class="controls">
    <br>
    <button onclick="setDir('UP')">⬆️</button><br>
    <button onclick="setDir('LEFT')">⬅️</button>
    <button onclick="setDir('DOWN')">⬇️</button>
    <button onclick="setDir('RIGHT')">➡️</button>
</div>

<!-- âm thanh -->
<audio id="eatSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="dieSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"></audio>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let box = 20;
let snake = [{x: 200, y: 200}];
let direction = "RIGHT";
let score = 0;
let highScore = localStorage.getItem("high") || 0;

document.getElementById("high").innerText = "High Score: " + highScore;

let food = spawnFood();

function spawnFood() {
    return {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };
}

// keyboard
document.addEventListener("keydown", (e) => {
    if (e.key=="ArrowUp") direction="UP";
    if (e.key=="ArrowDown") direction="DOWN";
    if (e.key=="ArrowLeft") direction="LEFT";
    if (e.key=="ArrowRight") direction="RIGHT";
});

// mobile
function setDir(dir) {
    direction = dir;
}

function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,400,400);

    // snake (neon)
    ctx.shadowColor = "#00ff00";
    ctx.shadowBlur = 15;
    ctx.fillStyle = "#00ff00";
    snake.forEach(s => ctx.fillRect(s.x,s.y,box,box));

    ctx.shadowBlur = 0;

    // food (đỏ sáng)
    ctx.fillStyle = "red";
    ctx.fillRect(food.x,food.y,box,box);

    let head = {x: snake[0].x, y: snake[0].y};

    if(direction=="UP") head.y -= box;
    if(direction=="DOWN") head.y += box;
    if(direction=="LEFT") head.x -= box;
    if(direction=="RIGHT") head.x += box;

    // ăn mồi
    if(head.x==food.x && head.y==food.y){
        score++;
        document.getElementById("score").innerText="Điểm: "+score;
        food = spawnFood();

        document.getElementById("eatSound").play();
    } else {
        snake.pop();
    }

    // game over
    if(head.x<0||head.y<0||head.x>=400||head.y>=400||
       snake.some(s=>s.x==head.x&&s.y==head.y)){
        
        document.getElementById("dieSound").play();

        if(score > highScore){
            localStorage.setItem("high", score);
        }

        setTimeout(() => {
            alert("💀 Thua rồi! Điểm: "+score);
            location.reload();
        }, 200);

        return;
    }

    snake.unshift(head);
}

setInterval(draw, 120);
</script>

</body>
</html>
