<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yeamiko Ultra</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: #00ff00;
    text-align: center;
    overflow-x: hidden;

    /* 🖼️ Ảnh nền */
    background: url("https://thanhvu2ky.github.io/web-nht/bg.jpg") no-repeat center;
    background-size: cover;
}
/* nền động */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #00ff0022, transparent);
    animation: bgMove 6s infinite alternate;
    z-index: -1;
    pointer-events: none;
}

@keyframes bgMove {
    from { transform: translateY(0); }
    to { transform: translateY(-40px); }
}

/* container */
.container {
    padding: 50px 20px;
}

/* tiêu đề */
h1 {
    font-size: 40px;
    text-shadow: 0 0 10px #00ff00, 0 0 30px #00ff00;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ff00; }
    to { text-shadow: 0 0 25px #00ff00, 0 0 50px #00ff00; }
}

p {
    opacity: 0.8;
}

/* card đẹp hơn */
.card {
    background: rgba(0,0,0,0.8);
    margin: 20px auto;
    padding: 20px;
    border-radius: 20px;
    max-width: 400px;
    box-shadow: 0 0 15px #00ff00;
    
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s forwards;
}

/* delay từng card */
.card:nth-child(3) { animation-delay: 0.2s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.6s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* nút */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 15px 30px;
    border-radius: 15px;
    background: black;
    color: #00ff00;
    border: 2px solid #00ff00;
    text-decoration: none;
    transition: 0.3s;
}

/* hover xịn hơn */
.btn:hover {
    background: #00ff00;
    color: black;
    transform: scale(1.1);
    box-shadow: 0 0 20px #00ff00;
}

/* nút copy IP */
.copy-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: #00ff00;
    color: black;
    cursor: pointer;
}

/* footer */
footer {
    margin-top: 40px;
    padding: 20px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔥 YEAMIKO ULTRA 🔥</h1>
    <p>Server chill - nơi giải trí của bạn 😎</p>

    <a href="https://dungmc.xyz" class="btn">🚀 Web Server</a>
    <a href="https://discord.gg/P7TC7QfeR" class="btn">💬 Discord</a>

    <div class="card">
        <h2>💚 Giới thiệu</h2>
        <p>
            Tôi là Thành.<br>
            Đây là web cá nhân để chia sẻ và giao lưu!
        </p>
    </div>

    <div class="card">
        <h2>🌟 Về server</h2>
        <p>
            ✔ Cụm Chill<br>
            ✔ Cụm SMP<br>
            ✔ Cộng đồng thân thiện
        </p>
    </div>

    <div class="card">
        <button class="copy-btn" onclick="copyIP()">📋 Copy IP</button>
    </div>

    <div class="card">
        <h2>📢 Thông tin</h2>
        <p>Tham gia để chơi cùng mình nhé 🔥</p>
    </div>

    <footer>
        © 2026 Yeamiko Ultra | Made by Thành 😎
    </footer>
</div>

<script>
function copyIP() {
    navigator.clipboard.writeText("yeamiko.fun");
    alert("Đã copy IP server!");
}
</script>

</body>
</html>
